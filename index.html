<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机械设备展示中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a5f7a;
            --primary-dark: #134b61;
            --primary-light: #2d8baf;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.4);
            --gradient-1: linear-gradient(135deg, #1a5f7a 0%, #2d8baf 100%);
            --gradient-2: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 20%, rgba(26, 95, 122, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(245, 158, 11, 0.1) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-2%, -2%) rotate(1deg); }
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            transition: all 0.3s ease;
        }

        .navbar-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1.25rem 0.875rem 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 95, 122, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .nav-stats {
            display: flex;
            gap: 2rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 主内容区 */
        .main-content {
            position: relative;
            z-index: 1;
            padding-top: 100px;
            min-height: 100vh;
        }

        /* Hero区域 */
        .hero {
            padding: 4rem 2rem;
            text-align: center;
            position: relative;
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 分类筛选 */
        .filter-section {
            padding: 0 2rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
        }

        .filter-tab {
            padding: 0.75rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-tab:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .filter-tab.active {
            background: var(--gradient-1);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(26, 95, 122, 0.4);
        }

        .filter-tab .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.125rem 0.5rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        /* 设备网格 */
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 设备卡片 */
        .equipment-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .equipment-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px var(--shadow);
        }

        .equipment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .equipment-card:hover::before {
            opacity: 1;
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .card-image::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, var(--bg-card) 0%, transparent 100%);
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--gradient-2);
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 1;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-category {
            display: inline-block;
            background: rgba(26, 95, 122, 0.2);
            color: var(--primary-light);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .card-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .spec-tag {
            background: var(--bg-dark);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .card-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-details {
            color: var(--primary-light);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: gap 0.3s ease;
        }

        .equipment-card:hover .view-details {
            gap: 0.75rem;
        }

        .price-tag {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* 详情模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-card);
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            position: relative;
            height: 300px;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-category {
            display: inline-block;
            background: var(--gradient-1);
            color: white;
            padding: 0.375rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .modal-description {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .spec-card {
            background: var(--bg-dark);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .spec-card-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .spec-card-value {
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 600;
        }

        .features-section {
            margin-bottom: 2rem;
        }

        .features-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .features-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 0.75rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            background: var(--bg-dark);
            border-radius: 8px;
            color: var(--text-secondary);
        }

        .feature-icon {
            color: var(--accent);
            font-size: 1.1rem;
        }

        .modal-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .modal-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.875rem 1.75rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 95, 122, 0.4);
        }

        .btn-secondary {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
        }

        /* 无结果提示 */
        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .no-results-text {
            font-size: 1.25rem;
        }

        /* 页脚 */
        .footer {
            position: relative;
            z-index: 1;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .equipment-card {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .navbar-content {
                flex-wrap: wrap;
            }

            .nav-stats {
                display: none;
            }

            .hero-title {
                font-size: 2rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .equipment-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .modal-header {
                height: 200px;
                font-size: 5rem;
            }

            .modal-title {
                font-size: 1.5rem;
            }

            .modal-footer {
                flex-direction: column;
            }

            .modal-actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>

        // 获取所有分类
        const categories = [...new Set(equipmentData.map(item => item.category))];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initStats();
            initFilterTabs();
            renderEquipment(equipmentData);
            initSearch();
            initModal();
        });

        // 初始化统计数据
        function initStats() {
            document.getElementById('totalCount').textContent = equipmentData.length;
            document.getElementById('categoryCount').textContent = categories.length;
        }

        // 初始化分类标签
        function initFilterTabs() {
            const filterTabs = document.getElementById('filterTabs');
            
            // 全部标签
            let html = `<button class="filter-tab active" data-category="all">
                全部设备 <span class="count">${equipmentData.length}</span>
            </button>`;
            
            // 各分类标签
            categories.forEach(category => {
                const count = equipmentData.filter(item => item.category === category).length;
                html += `<button class="filter-tab" data-category="${category}">
                    ${category} <span class="count">${count}</span>
                </button>`;
            });
            
            filterTabs.innerHTML = html;
            
            // 绑定点击事件
            filterTabs.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    // 更新激活状态
                    filterTabs.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 筛选设备
                    const category = this.dataset.category;
                    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                    filterEquipment(category, searchTerm);
                });
            });
        }

        // 渲染设备卡片
        function renderEquipment(equipment) {
            const grid = document.getElementById('equipmentGrid');
            const noResults = document.getElementById('noResults');
            
            if (equipment.length === 0) {
                grid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            noResults.style.display = 'none';
            
            grid.innerHTML = equipment.map((item, index) => `
                <div class="equipment-card" data-id="${item.id}" style="animation-delay: ${index * 0.1}s">
                    <div class="card-image">
                        <span class="card-badge">${item.badge}</span>
                        ${item.icon}
                    </div>
                    <div class="card-content">
                        <span class="card-category">${item.category}</span>
                        <h3 class="card-title">${item.name}</h3>
                        <p class="card-description">${item.shortDesc}</p>
                        <div class="card-specs">
                            ${Object.entries(item.specs).slice(0, 3).map(([key, value]) => 
                                `<span class="spec-tag">${value}</span>`
                            ).join('')}
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="view-details">查看详情 →</span>
                        <span class="price-tag">${item.price}</span>
                    </div>
                </div>
            `).join('');
            
            // 绑定卡片点击事件
            grid.querySelectorAll('.equipment-card').forEach(card => {
                card.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const item = equipmentData.find(e => e.id === id);
                    if (item) showModal(item);
                });
            });
        }

        // 筛选设备
        function filterEquipment(category, searchTerm) {
            let filtered = equipmentData;
            
            // 分类筛选
            if (category !== 'all') {
                filtered = filtered.filter(item => item.category === category);
            }
            
            // 搜索筛选
            if (searchTerm) {
                filtered = filtered.filter(item => 
                    item.name.toLowerCase().includes(searchTerm) ||
                    item.category.toLowerCase().includes(searchTerm) ||
                    item.shortDesc.toLowerCase().includes(searchTerm) ||
                    item.features.some(f => f.toLowerCase().includes(searchTerm))
                );
            }
            
            renderEquipment(filtered);
        }

        // 初始化搜索
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            let debounceTimer;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const activeCategory = document.querySelector('.filter-tab.active').dataset.category;
                    filterEquipment(activeCategory, this.value.toLowerCase());
                }, 300);
            });
        }

        // 显示详情模态框
        function showModal(item) {
            const modal = document.getElementById('modal');
            const modalOverlay = document.getElementById('modalOverlay');
            const modalHeader = document.getElementById('modalHeader');
            const modalBody = document.getElementById('modalBody');
            
            modalHeader.innerHTML = `
                ${item.icon}
                <button class="modal-close" id="modalCloseBtn">✕</button>
            `;
            
            modalBody.innerHTML = `
                <span class="modal-category">${item.category}</span>
                <h2 class="modal-title">${item.name}</h2>
                <p class="modal-subtitle">${item.shortDesc}</p>
                <p class="modal-description">${item.fullDesc}</p>
                
                <div class="specs-grid">
                    ${Object.entries(item.specs).map(([key, value]) => `
                        <div class="spec-card">
                            <div class="spec-card-label">${getSpecLabel(key)}</div>
                            <div class="spec-card-value">${value}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="features-section">
                    <h3 class="features-title">✨ 核心特性</h3>
                    <div class="features-list">
                        ${item.features.map(feature => `
                            <div class="feature-item">
                                <span class="feature-icon">✓</span>
                                <span>${feature}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="modal-footer">
                    <div class="modal-price">${item.price}</div>
                    <div class="modal-actions">
                        <button class="btn btn-secondary">收藏设备</button>
                        <button class="btn btn-primary">立即咨询</button>
                    </div>
                </div>
            `;
            
            modalOverlay.classList.add('active');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // 绑定关闭按钮
            document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
        }

        // 关闭模态框
        function closeModal() {
            const modal = document.getElementById('modal');
            const modalOverlay = document.getElementById('modalOverlay');
            
            modal.classList.remove('active');
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 初始化模态框
        function initModal() {
            const modalOverlay = document.getElementById('modalOverlay');
            const modalClose = document.getElementById('modalClose');
            
            modalOverlay.addEventListener('click', closeModal);
            modalClose.addEventListener('click', closeModal);
            
            // ESC键关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });
        }

        // 规格标签映射
        function getSpecLabel(key) {
            const labels = {
                power: '功率',
                weight: '重量',
                capacity: '容量',
                depth: '深度',
                height: '高度',
                radius: '工作半径',
                spindle: '主轴转速',
                accuracy: '精度',
                travel: '行程',
                speed: '速度',
                thickness: '切割厚度',
                area: '工作面积',
                blade: '刀片宽度',
                payload: '负载',
                reach: '臂展',
                voltage: '电压',
                frequency: '频率',
                fuel: '油耗',
                pressure: '压力',
                noise: '噪音',
                length: '长度',
                width: '宽度',
                force: '激振力'
            };
            return labels[key] || key;
        }
    </script>
